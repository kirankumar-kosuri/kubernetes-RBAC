apiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "praveen" to read pods in the "roboshop" namespace.
# You need to already have a Role named "roboshop-traniee" in that namespace.
kind: RoleBinding
metadata:
  name: roboshop-admin
  namespace: roboshop
subjects:
# You can specify more than one "subject"
- kind: User
  name: kiran # "name" is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
# "roleRef" specifies the binding to a Role / ClusterRole
  kind: Role #this must be Role or ClusterRole
  name: roboshop-admin # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "praveen" to read pods in the "roboshop" namespace.
# You need to already have a Role named "roboshop-traniee" in that namespace.
kind: ClusterRoleBinding
metadata:
  name: roboshop-admin
subjects:
# You can specify more than one "subject"
- kind: User
  name: kiran # "name" is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
# "roleRef" specifies the binding to a Role / ClusterRole
  kind: ClusterRole #this must be Role or ClusterRole
  name: roboshop-admin # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io
