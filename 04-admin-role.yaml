  # namsespace level
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: roboshop
  name: roboshop-admin
rules:
- apiGroups: ["*"] # "" indicates the core API group
  resources: ["*"]
  verbs: ["*"]
---
  # cluster level
apiVersion: rbac.authorization.k8s.io/v1
kind:   ClusterRole
metadata:
  # namespace is not required here because it is cluster level resources
  name: roboshop-admin
rules:
- apiGroups: ["storage.k8s.io/v1"] # "" indicates the core API group
  resources: ["storageclasses"]
  verbs: ["get", "watch", "list"]

- apiGroups: [""] # "" indicates the core API group
  resources: ["persistentvolumes"]
  verbs: ["get", "watch", "list"]
